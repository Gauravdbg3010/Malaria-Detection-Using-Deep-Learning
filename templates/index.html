<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Malaria Detection</title>

<style>

body{
font-family: Arial;
background: linear-gradient(120deg,#667eea,#764ba2);
color:white;
text-align:center;
padding:40px;
}

.box{
background:rgba(255,255,255,0.15);
padding:30px;
border-radius:15px;
width:500px;
margin:auto;
}

input,button{
margin-top:15px;
padding:10px;
width:90%;
border-radius:8px;
border:none;
}

button{
background:#00d4ff;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:20px;
padding:15px;
border-radius:10px;
background:rgba(0,0,0,0.2);
}

img{
margin-top:15px;
border-radius:10px;
max-width:100%;
}

</style>

</head>

<body>

<div class="box">

<h2>Malaria Detection System</h2>

<form action="/predict" method="post" enctype="multipart/form-data">

<input type="file" name="file" required>

<button type="submit">Predict</button>

</form>

{% if prediction %}

<div class="result">

<h3>Result: {{ prediction }}</h3>

<p>Confidence: {{ confidence }}%</p>

<p>Parasitized Probability: {{ p_parasitized }}%</p>

<p>Uninfected Probability: {{ p_uninfected }}%</p>

<p>Time: {{ timestamp }}</p>

{% if image_path %}

<img src="/{{ image_path }}">

{% endif %}

</div>

{% endif %}

</div>

</body>
</html>
